name: Deploy Prod

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'prod')
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DIGITALOCEAN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DIGITALOCEAN_USER }}@${{ secrets.DIGITALOCEAN_HOST }}" <<'EOF'
          set -euo pipefail
          cd /opt/buildstack
          git fetch origin --prune
          git checkout prod
          git reset --hard origin/prod
          docker compose up -d --build
          timeout 180 bash -c 'until curl -sf http://127.0.0.1:3000/api/health > /dev/null; do sleep 3; done'
          BASE_URL=http://127.0.0.1:3000 \
          PROJECT_ID="${PROJECT_ID:-}" \
          PROJECT_KEY="${PROJECT_KEY:-}" \
          API_KEY="${API_KEY:-}" \
          bash scripts/ops/smoke-deploy.sh
          EOF
        env:
          PROJECT_ID: ${{ secrets.SMOKE_PROJECT_ID }}
          PROJECT_KEY: ${{ secrets.SMOKE_PROJECT_KEY }}
          API_KEY: ${{ secrets.SMOKE_API_KEY }}