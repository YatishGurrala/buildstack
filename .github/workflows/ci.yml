name: CI

on:
  push:
    branches:
      - main
      - prod
  pull_request:
    branches:
      - main
      - prod

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      SKIP_AUTH: "false"
      CORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/core_db
      PROJECTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/projects_db
      JWT_SECRET: ci-test-jwt-secret-1234567890
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      SKIP_AUTH: "false"
      CORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/core_db
      PROJECTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/projects_db
      JWT_SECRET: ci-test-jwt-secret-1234567890
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Create databases
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/postgres" -c 'CREATE DATABASE core_db;'
          psql "postgresql://postgres:postgres@localhost:5432/postgres" -c 'CREATE DATABASE projects_db;'

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      SKIP_AUTH: "false"
      CORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/core_db
      PROJECTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/projects_db
      JWT_SECRET: ci-build-jwt-secret-1234567890
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build app
        run: npm run build